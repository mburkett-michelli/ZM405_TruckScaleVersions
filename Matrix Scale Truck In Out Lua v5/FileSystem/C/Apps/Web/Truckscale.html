<script type="text/javascript">

   data_received = 0;

function sendall(){
x = document.getElementById('A').value + "," + document.getElementById('B').value + "," + document.getElementById('C').value;

document.sendField.submit();

function getVariable(http_request, id) {
      if ((http_request.readyState == 4) && (http_request.status == 200)) {
         parseVariable(http_request.responseText, id);
      }
      data_received = 0;
  }

function parseVariable(data, variable_index) {
      
	  if (variable_index ==99) {
	   
    var appVarStr = JSON.parse(data) ; 
	appVarValue = appVarStr.value ; 
	var parsed = appVarValue.split("|");

in1=parsed[0];
in2=parsed[1];
in3=parsed[2];
setpt1 =  parsed[3] ; 
setpt2 =  parsed[4] ; 
setpt3 =  parsed[5] ; 
displayedWeight= parsed[6] ; 
units=parsed[7] ; 
mode=parsed[8];
motion=parsed[9];
center=parsed[10];
document.getElementById('displayedWeight').innerHTML = displayedWeight ;
document.getElementById('units').innerHTML = units + "<BR>"+ mode ;
}

if (in1 ==0){
	document.getElementById('input1').innerHTML = "OFF" ;
} else{
	document.getElementById('input1').innerHTML = " ON " ;
}


if (setpt1 ==0){
	document.getElementById('sp1').innerHTML = "1 OFF" ;
} else{
	document.getElementById('sp1').innerHTML = "1 ON " ;
	document.getElementById('Light1').src="images/TRFFC10A.bmp" ;
	document.getElementById('Light2').src="images/TRFFC10A.bmp" ;

}

if (setpt2 ==0){
	document.getElementById('sp2').innerHTML = "2 OFF" ;
} else{
	document.getElementById('sp2').innerHTML = "2 ON " ;
	document.getElementById('Light1').src="images/TRFFC10C.bmp" ;
	document.getElementById('Light2').src="images/TRFFC10C.bmp" ;

}

if (setpt3 ==0){
	document.getElementById('sp3').innerHTML = "  " ;
} else{
	document.getElementById('sp3').innerHTML = " SP3 " ;
}

if (motion ==0){
	document.getElementById('motionWeight').innerHTML = "  " ;
} else{
	document.getElementById('motionWeight').innerHTML = "Motion" ;
}

if (center ==1){
	document.getElementById('centerWeight').innerHTML = ">0<" ;
} else{
	document.getElementById('centerWeight').innerHTML = "   " ;
}

}
	
 
   function pageLoop() {

       if (!data_received) {
	    makeRequest("get_var.cgi", getVariable, "index", 99);
       }
        myvar = window.setTimeout("pageLoop()", 500);
        
   }

   window.onload = pageLoop;


</script>
